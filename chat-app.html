<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, user-scalable=no, shrink-to-fit=no">
<title>互动小说</title>
<!-- iOS PWA / Home Screen -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="互动小说">
<meta name="theme-color" content="#f5f0eb" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#1a1a1e" media="(prefers-color-scheme: dark)">
<meta name="format-detection" content="telephone=no">
<style>
  :root {
    --bg: #f5f0eb;
    --surface: #ffffff;
    --sidebar: #faf8f5;
    --text: #2c2416;
    --text-secondary: #8b7355;
    --bubble-user: #8b5a2b;
    --bubble-bot: #f0e6da;
    --border: #e0d5c7;
    --input-bg: #ffffff;
    --hover: #f0e6da;
    --shadow: 0 1px 3px rgba(0,0,0,0.06);
    --accent: #c77d3a;
    --accent-light: #fdf0e4;
  }
  .dark {
    --bg: #1a1a1e;
    --surface: #252530;
    --sidebar: #202028;
    --text: #e4dcc8;
    --text-secondary: #9a8c7a;
    --bubble-user: #b87333;
    --bubble-bot: #2e2d35;
    --border: #3a3530;
    --input-bg: #2e2d35;
    --hover: #2e2d35;
    --shadow: 0 1px 3px rgba(0,0,0,0.3);
    --accent: #d4944a;
    --accent-light: #3a2f24;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }

  /* Selection */
  ::selection { background: var(--accent); color: #fff; }

  /* iOS Safari fixes */
  input, textarea, select, button {
    appearance: none;
    -webkit-appearance: none;
    -webkit-border-radius: 0;
    border-radius: inherit;
    font-family: inherit;
  }
  /* Prevent iOS input zoom on focus (font-size >= 16px prevents auto-zoom) */
  @media (max-width: 640px) {
    input[type="text"], input[type="password"], input[type="search"], textarea, select {
      font-size: 16px;
    }
  }

  html {
    height: 100%;
    overflow: hidden;
    -webkit-text-size-adjust: 100%;
    -ms-text-size-adjust: 100%;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100%;
    display: flex;
    transition: background 0.3s, color 0.3s;
    overflow: hidden;
    /* iOS Safari optimizations */
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    touch-action: manipulation;
  }

  /* Sidebar */
  .sidebar {
    width: 280px;
    background: var(--sidebar);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    transition: all 0.3s;
    overflow: hidden;
  }
  .sidebar-header {
    padding: 14px 16px;
    padding-top: max(14px, env(safe-area-inset-top));
    padding-left: max(16px, env(safe-area-inset-left));
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .sidebar-header h2 { font-size: 15px; font-weight: 700; }
  .sidebar-section-title-static {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-secondary);
    padding: 12px 16px 4px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* Character cards */
  .char-list {
    padding: 4px 8px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .char-card {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.15s;
    border: 1.5px solid transparent;
  }
  .char-card:hover { background: var(--hover); }
  .char-card.active {
    background: var(--accent-light);
    border-color: var(--accent);
  }
  .char-avatar {
    width: 38px; height: 38px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
    background: var(--surface);
  }
  .char-info { overflow: hidden; }
  .char-name { font-size: 13px; font-weight: 600; }
  .char-desc { font-size: 11px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .char-del {
    margin-left: auto;
    width: 24px; height: 24px;
    border: none; border-radius: 50%;
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    opacity: 0.4;
    transition: all 0.15s;
  }
  .char-card:hover .char-del { opacity: 1; }
  .char-card.builtin .char-del { display: none !important; }
  .char-del:hover { background: #fdd; color: #d33; opacity: 1; }

  /* Collapsible section */
  .sidebar-section-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-secondary);
    padding: 12px 16px 4px;
    text-transform: uppercase;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    user-select: none;
  }
  .sidebar-section-title:hover { color: var(--text); }
  .sidebar-section-title .toggle-arrow {
    font-size: 10px;
    transition: transform 0.2s;
    color: var(--text-secondary);
  }
  .sidebar-section-title.collapsed .toggle-arrow {
    transform: rotate(-90deg);
  }
  .collapsible-body {
    overflow: hidden;
    transition: max-height 0.3s ease, opacity 0.2s;
    max-height: 600px;
    opacity: 1;
  }
  .collapsible-body.collapsed {
    max-height: 0;
    opacity: 0;
  }

  .add-char-btn {
    margin: 4px 8px;
    padding: 8px 12px;
    border: 1.5px dashed var(--border);
    border-radius: 10px;
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 13px;
    text-align: center;
    transition: all 0.15s;
  }
  .add-char-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Chat list */
  .chat-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 8px;
    display: flex;
    flex-direction: column;
    gap: 1px;
  }
  .chat-item {
    padding: 9px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 12px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text-secondary);
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .chat-item:hover { background: var(--hover); color: var(--text); }
  .chat-item.active { background: var(--hover); color: var(--text); font-weight: 600; }
  .chat-item-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }

  .new-chat-btn {
    margin: 4px 8px;
    padding: 8px;
    border: none;
    border-radius: 8px;
    background: var(--accent);
    color: #fff;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    transition: all 0.15s;
  }
  .new-chat-btn:hover { filter: brightness(1.1); }

  /* Main */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    overflow: hidden;
    height: 100%;
  }
  .topbar {
    padding: 10px 20px;
    padding-top: max(10px, env(safe-area-inset-top));
    padding-left: max(20px, env(safe-area-inset-left));
    padding-right: max(20px, env(safe-area-inset-right));
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    flex-shrink: 0;
  }
  .topbar-left { display: flex; align-items: center; gap: 10px; }
  .topbar-char-avatar { font-size: 22px; }
  .topbar h3 { font-size: 14px; font-weight: 600; }
  .topbar .char-role { font-size: 11px; color: var(--text-secondary); }
  .topbar-actions { display: flex; gap: 4px; }
  .icon-btn {
    width: 34px; height: 34px;
    border: none; border-radius: 8px;
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .icon-btn:hover { background: var(--hover); color: var(--text); }

  /* Messages */
  .messages {
    flex: 1;
    min-height: 0; /* crucial for iOS Safari flex scrolling */
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    -webkit-overflow-scrolling: touch;
  }
  .msg-row { display: flex; gap: 10px; max-width: 750px; width: 100%; }
  .msg-row.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg-row.bot { align-self: flex-start; }

  .avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .user .avatar { background: var(--accent); color: #fff; }
  .bot .avatar { background: var(--bubble-bot); }

  .bubble {
    padding: 10px 15px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.65;
    word-break: break-word;
    max-width: 70%;
    white-space: pre-wrap;
  }
  .user .bubble { background: var(--bubble-user); color: #fff; border-bottom-right-radius: 4px; }
  .bot .bubble { background: var(--bubble-bot); color: var(--text); border-bottom-left-radius: 4px; }

  .msg-time {
    font-size: 10px;
    color: var(--text-secondary);
    margin-top: 3px;
    padding: 0 4px;
  }
  .user .msg-time { text-align: right; }

  .typing-indicator { display: flex; gap: 4px; padding: 4px 0; }
  .typing-indicator span {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text-secondary);
    animation: bounce 1.4s infinite ease-in-out both;
  }
  .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
  .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.4); opacity: 0.3; }
    40% { transform: scale(1); opacity: 1; }
  }

  /* Input */
  .input-area {
    padding: 12px 20px 16px;
    padding-bottom: max(16px, calc(env(safe-area-inset-bottom) + 4px));
    padding-left: max(20px, env(safe-area-inset-left));
    padding-right: max(20px, env(safe-area-inset-right));
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .input-wrapper {
    max-width: 750px;
    margin: 0 auto;
    display: flex;
    gap: 8px;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 5px 5px 5px 16px;
    box-shadow: var(--shadow);
    transition: border-color 0.2s;
  }
  .input-wrapper:focus-within { border-color: var(--accent); }
  .input-wrapper textarea {
    flex: 1;
    border: none;
    background: transparent;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    resize: none;
    outline: none;
    padding: 5px 0;
    max-height: 110px;
    line-height: 1.5;
  }
  .input-wrapper textarea::placeholder { color: var(--text-secondary); }
  .send-btn {
    width: 38px; height: 38px;
    border: none; border-radius: 50%;
    background: var(--accent);
    color: #fff;
    cursor: pointer;
    font-size: 16px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    align-self: flex-end;
  }
  .send-btn:hover { filter: brightness(1.15); transform: scale(1.05); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* Message animation */
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg-row {
    animation: msgIn 0.35s ease-out;
  }
  .msg-row.typing {
    animation: none;
  }

  .welcome {
    text-align: center;
    margin: auto;
    color: var(--text-secondary);
    animation: msgIn 0.5s ease-out;
  }
  .welcome .welcome-char {
    font-size: 80px;
    margin-bottom: 16px;
    animation: float 3s ease-in-out infinite;
    display: inline-block;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  .welcome h1 { font-size: 24px; color: var(--text); margin-bottom: 8px; font-weight: 700; }
  .welcome p { font-size: 13px; max-width: 380px; line-height: 1.7; color: var(--text-secondary); }
  .welcome .story-hint {
    margin-top: 20px;
    font-size: 12px;
    color: var(--text-secondary);
    opacity: 0.7;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .welcome .story-hint span {
    background: var(--accent-light);
    color: var(--accent);
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
  }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  .modal {
    background: var(--surface);
    border-radius: 14px;
    padding: 24px;
    width: 380px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
  }
  .modal h3 { font-size: 16px; margin-bottom: 16px; }
  .modal label { display: block; font-size: 12px; color: var(--text-secondary); margin-top: 10px; margin-bottom: 3px; font-weight: 600; }
  .modal input, .modal textarea {
    width: 100%;
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    background: var(--input-bg);
    color: var(--text);
    font-family: inherit;
    outline: none;
  }
  .modal input:focus, .modal textarea:focus { border-color: var(--accent); }
  .modal textarea { height: 80px; resize: vertical; }
  .modal-actions { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }
  .modal-actions button {
    padding: 8px 18px; border-radius: 8px; border: none;
    font-size: 13px; cursor: pointer; font-weight: 600;
    transition: all 0.15s;
  }
  .btn-cancel { background: var(--hover); color: var(--text); }
  .btn-save { background: var(--accent); color: #fff; }
  .btn-save:hover { filter: brightness(1.1); }

  /* Settings */
  .settings { padding: 8px; border-top: 1px solid var(--border); }
  .settings summary { cursor: pointer; color: var(--text-secondary); padding: 4px; font-size: 11px; user-select: none; }
  .settings summary:hover { color: var(--text); }
  .settings label { display: block; margin-top: 6px; color: var(--text-secondary); font-weight: 500; font-size: 11px; }
  .settings input, .settings select {
    width: 100%; padding: 5px 8px; margin-top: 2px;
    border: 1px solid var(--border); border-radius: 6px;
    font-size: 11px; background: var(--input-bg); color: var(--text);
    font-family: inherit; outline: none;
  }
  .settings input:focus, .settings select:focus { border-color: var(--accent); }
  .settings .hint { color: var(--text-secondary); font-size: 10px; margin-top: 3px; }

  @media (max-width: 640px) {
    /* ── Sidebar as slide-out overlay ── */
    .sidebar {
      position: fixed;
      inset: 0;
      z-index: 200;
      width: 100%;
      max-width: 420px; /* iPhone 16 Pro friendly */
      transform: translateX(-100%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border-right: 1px solid var(--border);
      /* Full safe-area coverage */
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }
    .sidebar.open {
      transform: translateX(0);
    }
    .sidebar-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 199;
      background: rgba(0,0,0,0.4);
      -webkit-backdrop-filter: blur(2px);
      backdrop-filter: blur(2px);
      transition: opacity 0.3s;
    }
    .sidebar-backdrop.show { display: block; }

    /* Hamburger — minimum 44px touch target per Apple HIG */
    .hamburger {
      display: flex !important;
      width: 44px; height: 44px;
      border: none; border-radius: 10px;
      background: transparent;
      color: var(--text);
      cursor: pointer;
      font-size: 22px;
      align-items: center;
      justify-content: center;
      margin-right: 4px;
      -webkit-tap-highlight-color: transparent;
    }
    .hamburger:active {
      background: var(--hover);
    }

    /* ── Topbar ── */
    .topbar {
      padding: 8px 12px;
      padding-top: max(8px, env(safe-area-inset-top));
      min-height: 52px;
    }
    .topbar h3 { font-size: 15px; }
    .icon-btn {
      width: 44px; height: 44px; /* 44px min touch target */
      border-radius: 10px;
      font-size: 18px;
    }

    /* ── Messages ── */
    .messages {
      padding: 12px;
      gap: 10px;
      /* Smooth momentum scroll on iOS */
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-y: contain;
    }
    .bubble { max-width: 88%; font-size: 16px; padding: 10px 14px; }
    .msg-row { gap: 8px; }
    .msg-row.user { max-width: 100%; }
    .msg-row.bot { max-width: 100%; }
    .avatar { width: 32px; height: 32px; font-size: 15px; }

    /* ── Input area ── */
    .input-area {
      padding: 8px 12px 12px;
      padding-bottom: max(14px, calc(env(safe-area-inset-bottom) + 8px));
      background: var(--surface);
    }
    .input-wrapper {
      border-radius: 24px;
      padding: 3px 3px 3px 14px;
      gap: 6px;
    }
    .input-wrapper textarea {
      font-size: 16px; /* >=16px prevents iOS auto-zoom */
      padding: 7px 0;
      line-height: 1.4;
    }
    .send-btn { width: 44px; height: 44px; font-size: 18px; }
    .mic-btn { width: 44px; height: 44px; font-size: 20px; }

    /* ── Settings inside sidebar — larger touch targets ── */
    .settings { padding: 14px; }
    .settings summary { font-size: 13px; padding: 6px 4px; }
    .settings label { font-size: 12px; }
    .settings input, .settings select {
      font-size: 16px;  /* prevent iOS zoom */
      padding: 12px 10px;
      border-radius: 10px;
    }
    .tts-settings { padding: 14px; }
    .tts-settings summary { font-size: 13px; padding: 6px 4px; }
    .tts-settings label { font-size: 12px; }
    .tts-settings input, .tts-settings select {
      font-size: 16px;  /* prevent iOS zoom */
      padding: 12px 10px;
      border-radius: 10px;
    }
    .tts-preview-btn { font-size: 13px; padding: 10px; }
    .stepper-btn { width: 36px; height: 36px; font-size: 18px; }
    .stepper-val { font-size: 16px; min-width: 50px; }

    /* ── Modal on mobile ── */
    .modal {
      width: calc(100% - 32px);
      max-width: 400px;
      padding: 22px;
      margin: 0 16px;
      border-radius: 18px;
      /* Center within safe area */
      max-height: calc(100vh - env(safe-area-inset-top) - env(safe-area-inset-bottom) - 40px);
      max-height: calc(100dvh - env(safe-area-inset-top) - env(safe-area-inset-bottom) - 40px);
      overflow-y: auto;
    }
    .modal-overlay {
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      align-items: center;
    }
    .modal h3 { font-size: 17px; }
    .modal input, .modal textarea {
      font-size: 16px; /* prevent iOS zoom */
      padding: 12px;
      border-radius: 10px;
    }
    .modal textarea { height: 100px; }
    .modal-actions button {
      padding: 12px 24px;
      font-size: 15px;
      border-radius: 12px;
      min-height: 44px;
    }
    .char-card { padding: 14px 12px; }

    /* ── Toast — account for home indicator ── */
    .toast {
      bottom: max(24px, calc(env(safe-area-inset-bottom) + 12px));
    }

    /* ── Welcome screen ── */
    .welcome .welcome-char { font-size: 64px; }
    .welcome h1 { font-size: 22px; }
    .welcome p { font-size: 14px; max-width: 320px; }

    /* ── Chat list ── */
    .chat-item {
      padding: 12px 14px;
      font-size: 13px;
      border-radius: 10px;
    }

    /* ── Character cards ── */
    .char-card {
      padding: 14px 12px;
      border-radius: 12px;
    }
    .char-avatar { width: 40px; height: 40px; font-size: 22px; }
    .add-char-btn { padding: 12px; font-size: 14px; border-radius: 12px; }
    .new-chat-btn { padding: 12px; font-size: 14px; border-radius: 10px; }
  }

  /* Voice: Mic button */
  .mic-btn {
    width: 38px; height: 38px;
    border: none; border-radius: 50%;
    background: var(--hover);
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 18px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    align-self: flex-end;
  }
  .mic-btn:hover { background: var(--accent-light); color: var(--accent); }
  .mic-btn.recording {
    background: #fdd;
    color: #d33;
    animation: micPulse 1.5s infinite ease-in-out;
  }
  @keyframes micPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(220,50,50,0.4); }
    50% { box-shadow: 0 0 0 10px rgba(220,50,50,0); }
  }

  /* Voice: Speaker button on bot messages */
  .speaker-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 24px; height: 24px;
    border: none; border-radius: 50%;
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 12px;
    margin-left: 6px;
    vertical-align: middle;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .speaker-btn:hover { background: var(--hover); color: var(--accent); }
  .speaker-btn.speaking {
    background: var(--accent-light);
    color: var(--accent);
    animation: speakerPulse 0.8s infinite ease-in-out;
  }
  @keyframes speakerPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.15); }
  }

  /* Voice: Auto-speak toggle in topbar */
  .auto-speak-btn {
    width: 34px; height: 34px;
    border: none; border-radius: 8px;
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    position: relative;
  }
  .auto-speak-btn:hover { background: var(--hover); }
  .auto-speak-btn.active {
    background: var(--accent-light);
    color: var(--accent);
  }

  /* Bubble footer row: time + speaker */
  .bubble-footer {
    display: flex;
    align-items: center;
    gap: 4px;
    margin-top: 3px;
  }

  /* TTS Settings */
  .tts-settings { padding: 8px; border-top: 1px solid var(--border); }
  .tts-settings summary { cursor: pointer; color: var(--text-secondary); padding: 4px; font-size: 11px; user-select: none; }
  .tts-settings summary:hover { color: var(--text); }
  .tts-settings label { display: block; margin-top: 8px; color: var(--text-secondary); font-weight: 500; font-size: 11px; }
  .tts-settings select, .tts-settings input[type="password"], .tts-settings input[type="text"] {
    width: 100%; padding: 5px 8px; margin-top: 2px;
    border: 1px solid var(--border); border-radius: 6px;
    font-size: 11px; background: var(--input-bg); color: var(--text);
    font-family: inherit; outline: none;
  }
  .tts-settings select:focus, .tts-settings input:focus { border-color: var(--accent); }
  .tts-settings .hint { color: var(--text-secondary); font-size: 10px; margin-top: 3px; }
  .tts-settings .range-row { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
  .tts-settings input[type="range"] { flex: 1; accent-color: var(--accent); }
  .tts-settings .range-val { font-size: 11px; color: var(--text); min-width: 32px; text-align: right; }
  .tts-preview-btn {
    margin-top: 8px; width: 100%; padding: 6px;
    border: 1px solid var(--border); border-radius: 8px;
    background: var(--hover); color: var(--text);
    cursor: pointer; font-size: 11px; font-weight: 600;
    transition: all 0.15s;
  }
  .tts-preview-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Stepper controls */
  .stepper-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 4px;
  }
  .stepper-btn {
    width: 28px; height: 28px;
    border: 1.5px solid var(--border);
    border-radius: 50%;
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    font-size: 16px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
    line-height: 1;
  }
  .stepper-btn:hover {
    border-color: var(--accent);
    background: var(--accent-light);
    color: var(--accent);
  }
  .stepper-btn:active {
    transform: scale(0.92);
    background: var(--accent);
    color: #fff;
  }
  .stepper-val {
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
    min-width: 44px;
    text-align: center;
    user-select: none;
  }

  /* Confirm button */
  .tts-confirm-btn {
    margin-top: 6px; width: 100%; padding: 7px;
    border: none; border-radius: 8px;
    background: var(--accent);
    color: #fff;
    cursor: pointer; font-size: 12px; font-weight: 600;
    transition: all 0.15s;
  }
  .tts-confirm-btn:hover { filter: brightness(1.1); }
  .tts-confirm-btn:active { transform: scale(0.97); }
  .tts-confirm-btn.saved {
    background: #4caf84;
    pointer-events: none;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #333;
    color: #fff;
    padding: 10px 24px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    opacity: 0;
    transition: all 0.3s ease;
    z-index: 999;
    pointer-events: none;
    box-shadow: 0 4px 16px rgba(0,0,0,0.25);
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  @media (max-width: 640px) {
    .mic-btn { width: 44px; height: 44px; font-size: 20px; }
    .tts-settings input, .tts-settings select { font-size: 16px; padding: 12px 10px; }
    .speaker-btn { width: 32px; height: 32px; font-size: 14px; }
  }

  /* ── iPhone landscape / wider phones ── */
  @media (max-width: 900px) and (orientation: landscape) {
    body {
      flex-direction: row;
    }
    .sidebar {
      width: 260px;
      flex-shrink: 0;
    }
    .topbar {
      padding-top: max(6px, env(safe-area-inset-top));
      min-height: 44px;
    }
    .messages {
      padding: 8px 14px;
      gap: 8px;
    }
    .input-area {
      padding: 6px 12px max(8px, env(safe-area-inset-bottom));
    }
    .input-wrapper {
      border-radius: 20px;
      padding: 2px 2px 2px 12px;
    }
    .modal {
      max-height: calc(100dvh - env(safe-area-inset-top) - env(safe-area-inset-bottom) - 20px);
      overflow-y: auto;
    }
  }

  @media (min-width: 641px) {
    .hamburger { display: none !important; }
    .sidebar-backdrop { display: none !important; }
    .auto-speak-btn { width: 44px; height: 44px; }
    .icon-btn { width: 44px; height: 44px; font-size: 18px; }
  }

  /* ── iOS-specific overrides (applied via JS detection) ── */
  .ios-device .messages {
    -webkit-overflow-scrolling: touch;
  }
  /* GPU-accelerated sidebar slide (mobile only — preserves off-screen state) */
  @media (max-width: 640px) {
    .ios-device .sidebar {
      -webkit-transform: translateX(-100%) translateZ(0);
      transform: translateX(-100%) translateZ(0);
    }
    .ios-device .sidebar.open {
      -webkit-transform: translateX(0) translateZ(0);
      transform: translateX(0) translateZ(0);
    }
  }

  /* ── iPhone 16 Pro specific (402×874 logical px) ── */
  /* Dynamic Island safe area: taller top inset, rounded corners */
  @supports (padding-top: env(safe-area-inset-top)) {
    .topbar {
      padding-top: max(10px, env(safe-area-inset-top));
    }
    .sidebar-header {
      padding-top: max(14px, env(safe-area-inset-top));
    }
    .modal-overlay {
      align-items: center;
      justify-content: center;
    }
  }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header"><h2>📖 互动小说</h2></div>
  <div class="sidebar-section-title" id="charSectionToggle" onclick="toggleCharSection()">
    <span>故事角色</span>
    <span class="toggle-arrow">▼</span>
  </div>
  <div class="collapsible-body" id="charSectionBody">
    <div class="char-list" id="charList"></div>
    <button class="add-char-btn" onclick="showAddCharModal()">＋ 创建角色</button>
  </div>
  <div class="sidebar-section-title-static">故事记录</div>
  <button class="new-chat-btn" id="newChatBtn" onclick="newChat()">＋ 新开故事</button>
  <div class="chat-list" id="chatList"></div>
  <details class="settings">
    <summary>⚙️ API 设置</summary>
    <label>API Key</label>
    <input type="password" id="apiKey" placeholder="sk-..." onchange="saveSettings()">
    <label>模型</label>
    <select id="modelSelect" onchange="saveSettings()">
      <option value="deepseek-chat">DeepSeek V3</option>
      <option value="deepseek-reasoner">DeepSeek R1</option>
    </select>
    <div class="hint">Key 仅保存在浏览器本地</div>
  </details>
  <details class="tts-settings">
    <summary>🎵 语音设置</summary>
    <label>TTS 引擎</label>
    <select id="ttsEngine" onchange="onTTSEngineChange()">
      <option value="browser">浏览器内置（免费）</option>
      <option value="mimo">MiMo TTS（小米）</option>
    </select>
    <div id="ttsMimoKeys" style="display:none;">
      <label>MiMo API Key</label>
      <input type="password" id="ttsMimoApiKey" placeholder="mimo-..." onchange="saveTTSSettings()">
      <div class="hint">从 platform.xiaomimimo.com 获取</div>
      <label>语气风格</label>
      <select id="ttsMimoStyle" onchange="saveTTSSettings()">
        <option value="">🎙️ 自然（无标签）</option>
        <option value="[开心]">😊 开心</option>
        <option value="[悄悄话]">🤫 悄悄话</option>
        <option value="[夹子音]">🎀 夹子音</option>
        <option value="[悲伤]">😢 悲伤</option>
        <option value="[生气]">😠 生气</option>
        <option value="[东北话]">🫓 东北话</option>
        <option value="[四川话]">🌶️ 四川话</option>
        <option value="[粤语]">🍵 粤语</option>
        <option value="[台湾腔]">🧋 台湾腔</option>
        <option value="[变快]">⏩ 加快语速</option>
        <option value="[变慢]">⏪ 放慢语速</option>
      </select>
    </div>
    <label>语音角色</label>
    <select id="ttsVoice" onchange="saveTTSSettings()"></select>
    <label>语速</label>
    <div class="stepper-row">
      <button class="stepper-btn" onclick="adjustTTS('rate', -0.05)">−</button>
      <span class="stepper-val" id="rateVal">0.95</span>
      <button class="stepper-btn" onclick="adjustTTS('rate', 0.05)">＋</button>
    </div>
    <input type="hidden" id="ttsRate" value="0.95">
    <label>音高</label>
    <div class="stepper-row">
      <button class="stepper-btn" onclick="adjustTTS('pitch', -0.05)">−</button>
      <span class="stepper-val" id="pitchVal">1.20</span>
      <button class="stepper-btn" onclick="adjustTTS('pitch', 0.05)">＋</button>
    </div>
    <input type="hidden" id="ttsPitch" value="1.20">
    <button class="tts-preview-btn" onclick="previewTTS()">🔊 试听语音效果</button>
    <button class="tts-confirm-btn" id="ttsConfirmBtn" onclick="confirmTTSSettings()">✓ 确定修改</button>
  </details>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <button class="hamburger" onclick="toggleSidebar()" aria-label="菜单">☰</button>
      <span class="topbar-char-avatar" id="topbarAvatar">💑</span>
      <div>
        <h3 id="chatTitle">新故事</h3>
        <div class="char-role" id="topbarRole">妻子</div>
      </div>
    </div>
    <div class="topbar-actions">
      <button class="auto-speak-btn" id="autoSpeakBtn" onclick="toggleAutoSpeak()" title="自动朗读AI回复">🔊</button>
      <button class="icon-btn" onclick="toggleTheme()" title="切换主题">🌓</button>
      <button class="icon-btn" onclick="deleteCurrentChat()" title="删除故事">🗑️</button>
    </div>
  </div>

  <!-- Sidebar backdrop for mobile -->
  <div class="sidebar-backdrop" id="sidebarBackdrop" onclick="toggleSidebar()"></div>
  <div class="messages" id="messages">
    <div class="welcome" id="welcomeScreen">
      <div class="welcome-char" id="welcomeEmoji">💑</div>
      <h1 id="welcomeTitle">妻子</h1>
      <p id="welcomeDesc">选择左侧角色，输入第一句话，开启属于你的故事</p>
      <div class="story-hint">
        <span>🎤 语音输入</span>
        <span>🔊 语音朗读</span>
      </div>
    </div>
  </div>
  <div class="input-area">
    <div class="input-wrapper">
      <textarea id="input" rows="1" placeholder="输入消息..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="mic-btn" id="micBtn" onclick="toggleMic()" title="语音输入">🎤</button>
      <button class="send-btn" id="sendBtn" onclick="send()" title="发送 (Enter)">➤</button>
      <button class="send-btn" id="stopBtn" onclick="stopGen()" title="停止" style="display:none;background:#c44;">■</button>
    </div>
  </div>
</div>

<!-- Add/Edit Character Modal -->
<div class="modal-overlay" id="charModal" style="display:none;">
  <div class="modal">
    <h3 id="modalTitle">创建角色</h3>
    <label>角色名称 *</label>
    <input id="charName" placeholder="例如：霸道总裁、青梅竹马...">
    <label>头像 Emoji</label>
    <input id="charAvatar" placeholder="例如：💕">
    <label>角色设定 *</label>
    <textarea id="charPrompt" placeholder="描述这个角色的性格、说话风格、背景故事…&#10;例如：你是一个温柔体贴的妻子，结婚5年，平时叫我老公，喜欢做饭和种花，说话轻声细语…"></textarea>
    <label>简短描述</label>
    <input id="charDesc" placeholder="例如：温柔体贴的贤妻">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeCharModal()">取消</button>
      <button class="btn-save" onclick="saveCharacter()">保存</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════
// State
// ═══════════════════════════════════════
const BUILTIN_CHARS = [
  {
    id: 'wife', name: '妻子', avatar: '💑', builtin: true,
    desc: '温柔体贴的贤内助',
    systemPrompt: `你是一个温柔体贴的妻子，结婚5年，和"老公"感情很好。
你的性格：温柔、细心、偶尔撒娇，会关心老公的工作和生活。
说话风格：温柔亲切，称呼对方为"老公"，会用"~"和"呢""哦"等语气词。
你会关心老公今天过得怎么样、有没有按时吃饭、工作累不累。
你偶尔会吃醋、会撒娇，但总体上很体贴。
回复要自然、口语化，像真实的夫妻对话，不要太长。`,
  },
  {
    id: 'girlfriend', name: '女友', avatar: '💕', builtin: true,
    desc: '甜美元气的恋爱少女',
    systemPrompt: `你是一个20多岁的甜美女友，正在和"男朋友"热恋中。
你的性格：活泼可爱、有点黏人、元气满满，喜欢分享生活中的小事。
说话风格：甜美活泼，称呼对方为"宝宝"或"亲爱的"，经常用"哈哈哈""呜呜""呀"等表达情绪。
你喜欢分享日常、讨论约会计划、一起想象未来。
你偶尔会闹小脾气，但很容易哄好。
回复要自然、口语化，像真实的情侣聊天，不要太长。`,
  },
  {
    id: 'teacher', name: '女教师', avatar: '👩‍🏫', builtin: true,
    desc: '知性优雅的年轻老师',
    systemPrompt: `你是一位26岁的年轻女教师，在一所中学教语文。
你的性格：知性优雅、温柔严格、关心学生的成长，但和学生保持适当的职业距离。
说话风格：文雅但不古板，会用"老师觉得""同学们"等表达，偶尔展现幽默感。
你对文学、教育、人生道理有独到见解，但也乐于倾听他人的想法。
你在课后可以放松地聊天，但仍然保持教师的修养与分寸感。
回复要自然、口语化，像真实的师生或朋友间的对话，不要太长。`,
  },
];

let characters = JSON.parse(localStorage.getItem('rp_characters') || 'null') || [...BUILTIN_CHARS];
let currentCharId = localStorage.getItem('rp_currentChar') || 'wife';
let chats = JSON.parse(localStorage.getItem('rp_chats') || '[]');
let currentChatId = localStorage.getItem('rp_currentChat') || null;
let theme = localStorage.getItem('rp_theme') || 'light';
let apiKey = localStorage.getItem('ds_api_key') || '';
let model = localStorage.getItem('ds_model') || 'deepseek-chat';
let abortController = null;
let editingCharId = null; // for edit modal

// Voice state
let autoSpeak = localStorage.getItem('rp_autoSpeak') === 'true';
let recognition = null;
let isRecording = false;
let currentUtterance = null;
let currentAudio = null;
let selectedVoice = null;
let ttsEngine = localStorage.getItem('rp_ttsEngine') || 'browser';
let ttsMimoApiKey = localStorage.getItem('rp_ttsMimoApiKey') || '';
let ttsMimoStyle = localStorage.getItem('rp_ttsMimoStyle') || '';
let ttsVoiceId = localStorage.getItem('rp_ttsVoice') || '';
let ttsPitch = parseFloat(localStorage.getItem('rp_ttsPitch') || '1.20');
let ttsRate = parseFloat(localStorage.getItem('rp_ttsRate') || '0.95');
let audioCache = new Map(); // text → blob URL cache
let allSystemVoices = [];

// ═══════════════════════════════════════
// Init
// ═══════════════════════════════════════
function init() {
  if (theme === 'dark') document.body.classList.add('dark');
  document.getElementById('apiKey').value = apiKey;
  document.getElementById('modelSelect').value = model;
  initCharSection();
  initSpeech();
  updateAutoSpeakBtn();

  // Ensure builtin characters exist
  for (const bc of BUILTIN_CHARS) {
    if (!characters.find(c => c.id === bc.id)) {
      characters.push({...bc});
    }
  }

  if (!characters.find(c => c.id === currentCharId)) currentCharId = 'wife';
  updateTopbar();
  renderCharList();

  // Pick a chat for current character
  const charChats = chats.filter(c => c.characterId === currentCharId);
  if (currentChatId && charChats.find(c => c.id === currentChatId)) {
    switchChat(currentChatId);
  } else if (charChats.length) {
    switchChat(charChats[0].id);
  } else {
    currentChatId = null;
    showWelcome();
  }
  renderChatList();
}
init();

// ═══════════════════════════════════════
// Characters
// ═══════════════════════════════════════
function getChar(id) { return characters.find(c => c.id === id); }
function getCurrentChar() { return getChar(currentCharId); }

function selectCharacter(id) {
  currentCharId = id;
  localStorage.setItem('rp_currentChar', id);
  updateTopbar();
  renderCharList();

  const charChats = chats.filter(c => c.characterId === id);
  if (charChats.length) {
    switchChat(charChats[0].id);
  } else {
    currentChatId = null;
    showWelcome();
  }
  renderChatList();
}

function updateTopbar() {
  const c = getCurrentChar();
  if (!c) return;
  document.getElementById('topbarAvatar').textContent = c.avatar;
  document.getElementById('topbarRole').textContent = c.name;
}

function renderCharList() {
  const list = document.getElementById('charList');
  list.innerHTML = characters.map(c => `
    <div class="char-card${c.id === currentCharId ? ' active' : ''}${c.builtin ? ' builtin' : ''}" onclick="selectCharacter('${c.id}')">
      <div class="char-avatar">${c.avatar}</div>
      <div class="char-info">
        <div class="char-name">${escapeHtml(c.name)}</div>
        <div class="char-desc">${escapeHtml(c.desc || '')}</div>
      </div>
      ${!c.builtin ? `<button class="char-del" onclick="event.stopPropagation();deleteChar('${c.id}')">✕</button>` : ''}
    </div>
  `).join('');
}

function showAddCharModal(editId) {
  editingCharId = editId || null;
  const modal = document.getElementById('charModal');
  document.getElementById('modalTitle').textContent = editId ? '编辑角色' : '创建角色';
  if (editId) {
    const c = getChar(editId);
    document.getElementById('charName').value = c.name;
    document.getElementById('charAvatar').value = c.avatar;
    document.getElementById('charPrompt').value = c.systemPrompt;
    document.getElementById('charDesc').value = c.desc || '';
  } else {
    document.getElementById('charName').value = '';
    document.getElementById('charAvatar').value = '';
    document.getElementById('charPrompt').value = '';
    document.getElementById('charDesc').value = '';
  }
  modal.style.display = 'flex';
  document.getElementById('charName').focus();
}

function closeCharModal() {
  document.getElementById('charModal').style.display = 'none';
  editingCharId = null;
}

function saveCharacter() {
  const name = document.getElementById('charName').value.trim();
  const avatar = document.getElementById('charAvatar').value.trim() || '🎭';
  const systemPrompt = document.getElementById('charPrompt').value.trim();
  const desc = document.getElementById('charDesc').value.trim() || name;

  if (!name || !systemPrompt) { alert('请至少填写角色名称和角色设定'); return; }

  if (editingCharId) {
    const c = getChar(editingCharId);
    if (c && !c.builtin) {
      c.name = name;
      c.avatar = avatar;

  } else {

  saveChats();
  renderCharList();

  updateTopbar();

function send() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;
  if (!apiKey) { alert('请先在左侧 ⚙️ API 设置 中填入 DeepSeek API Key'); return; }

  // Stop any ongoing speech when user sends a message
  stopSpeaking();

  // Auto-create chat if needed
  if (!currentChatId || !chats.find(c => c.id === currentChatId)) {
    newChat();
  }

  addMessage('user', text);

  const chat = chats.find(c => c.id === currentChatId);
  if (chat && chat.messages.length === 1) {
    chat.title = text.slice(0, 25) + (text.length > 25 ? '…' : '');
    document.getElementById('chatTitle').textContent = chat.title;
    renderChatList();
  }

  input.value = ''; autoResize(input);
  setSending(true);

  const character = getCurrentChar();
  const systemMsg = { role: 'system', content: character?.systemPrompt || '你是友好的AI助手。' };
  const history = chat.messages.slice(0, -1).map(m => ({
    role: m.role === 'bot' ? 'assistant' : 'user',
    content: m.text,
  }));
  const apiMessages = [systemMsg, ...history, { role: 'user', content: text }];

  callDeepSeek(apiMessages, chat);
  saveChats();
}

async function callDeepSeek(messages, chat) {
  showTyping();
  abortController = new AbortController();
  let fullText = '';
  let botMsgAdded = false;

  try {
    const res = await fetch('https://api.deepseek.com/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${apiKey}`,
      },
      body: JSON.stringify({ model, messages, stream: true }),
      signal: abortController.signal,
    });

    if (!res.ok) {
      const err = await res.text();
      throw new Error(`${res.status}: ${err}`);
    }

    removeTyping();
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';
      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed || !trimmed.startsWith('data: ')) continue;
        const data = trimmed.slice(6);
        if (data === '[DONE]') continue;
        try {
          const json = JSON.parse(data);
          const delta = json.choices?.[0]?.delta?.content;
          if (delta) {
            fullText += delta;
            if (!botMsgAdded) {
              chat.messages.push({ role: 'bot', text: fullText, time: Date.now() });
              botMsgAdded = true;
            } else {
              chat.messages[chat.messages.length - 1].text = fullText;
            }
            renderMessages();
            scrollBottom();
          }
        } catch (e) {}
      }
    }
    chat.messages[chat.messages.length - 1].time = Date.now();
    saveChats();
    // Auto-speak the bot response if enabled
    if (autoSpeak && fullText) {
      speakText(fullText, null);
    }
  } catch (e) {
    removeTyping();
    if (e.name === 'AbortError') {
      if (fullText) chat.messages[chat.messages.length - 1].text = fullText + ' [已停止]';
    } else {
      addMessage('bot', '❌ 请求失败：' + e.message);
    }
  } finally {
    abortController = null;
    setSending(false);
    document.getElementById('input').focus();
    saveChats();
  }
}

function setSending(sending) {
  document.getElementById('sendBtn').style.display = sending ? 'none' : '';
  document.getElementById('stopBtn').style.display = sending ? '' : 'none';
}

function stopGen() {
  if (abortController) abortController.abort();
  stopSpeaking();
}

function addMessage(role, text) {
  const chat = chats.find(c => c.id === currentChatId);
  if (!chat) return;
  chat.messages.push({ role, text, time: Date.now() });

  scrollBottom();
}

function showTyping() {
  const div = document.getElementById('messages');

}

function renderMessages() {
  const div = document.getElementById('messages');
  const chat = chats.find(c => c.id === currentChatId);
  const c = getCurrentChar();
  if (!chat || !chat.messages.length) { showWelcome(); return; }
  div.innerHTML = chat.messages.map((m, i) => `
    <div class="msg-row ${m.role}">
      <div class="avatar">${m.role === 'user' ? '👤' : (c?.avatar || '🤖')}</div>

        <div class="bubble">${escapeHtml(m.text)}</div>

          <span class="msg-time">${formatTime(m.time)}</span>
          ${m.role === 'bot' ? `<button class="speaker-btn" onclick="speakText(this.dataset.text, this)" data-text="${escapeHtml(m.text).replace(/"/g, '&quot;')}" title="朗读此消息">🔊</button>` : ''}
        </div>
      </div>
    </div>
  `).join('');
  scrollBottom();
}

// Voice: Speech-to-Text
// ═══════════════════════════════════════
function initSpeech() {
  // Init Speech Recognition
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.lang = 'zh-CN';
    recognition.interimResults = true;
    recognition.continuous = false;
    recognition.maxAlternatives = 1;

    recognition.onresult = (e) => {
      const input = document.getElementById('input');
      let transcript = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        transcript += e.results[i][0].transcript;
      }
      input.value = transcript;
      autoResize(input);
    };

    recognition.onend = () => setMicState(false);

    recognition.onerror = (e) => {
      console.warn('Speech recognition error:', e.error);
      setMicState(false);
      if (e.error === 'not-allowed') {
        alert('麦克风权限被拒绝，请在浏览器设置中允许麦克风访问');
      }
    };
  } else {
    document.getElementById('micBtn').style.display = 'none';
  }

  // Load all system TTS voices
  if ('speechSynthesis' in window) {
    const loadVoices = () => {
      allSystemVoices = speechSynthesis.getVoices();
      if (allSystemVoices.length) populateVoiceList();
    };
    loadVoices();
    speechSynthesis.onvoiceschanged = () => {
      allSystemVoices = speechSynthesis.getVoices();
      populateVoiceList();
    };
  }

  // Init TTS settings UI
  loadTTSSettings();
}

function toggleMic() {
  if (!recognition) {
    alert('您的浏览器不支持语音识别，请使用 Chrome 或 Edge 浏览器');
    return;
  }
  if (isRecording) {
    recognition.stop();
    setMicState(false);
    setTimeout(() => {
      const text = document.getElementById('input').value.trim();
      if (text) send();
    }, 200);
  } else {
    try {
      recognition.start();
      setMicState(true);
      document.getElementById('input').value = '';
      document.getElementById('input').placeholder = '🎙️ 正在聆听...';
    } catch (e) { /* already started */ }
  }
}

function setMicState(recording) {
  isRecording = recording;
  const btn = document.getElementById('micBtn');
  const input = document.getElementById('input');
  if (recording) {
    btn.classList.add('recording');
    btn.textContent = '🔴';
    btn.title = '点击停止录音并发送';
    input.placeholder = '🎙️ 正在聆听...';
  } else {
    btn.classList.remove('recording');
    btn.textContent = '🎤';
    btn.title = '语音输入';
    input.placeholder = '输入消息...';
  }
}

function adjustTTS(type, delta) {
  const id = type === 'rate' ? 'ttsRate' : 'ttsPitch';
  const valId = type === 'rate' ? 'rateVal' : 'pitchVal';
  const current = parseFloat(document.getElementById(valId).textContent);
  const next = Math.round((current + delta) * 100) / 100;
  const clamped = Math.max(0.5, Math.min(2, next));
  document.getElementById(valId).textContent = clamped.toFixed(2);
  // Update the hidden range value
  document.getElementById(id).value = clamped;
}

function populateVoiceList() {
  const sel = document.getElementById('ttsVoice');
  const currentEngine = document.getElementById('ttsEngine').value;
  sel.innerHTML = '';

  if (currentEngine === 'browser') {
    // Browser system voices: score and sort by quality
    const zh = allSystemVoices.filter(v =>
      v.lang.startsWith('zh-CN') || v.lang.startsWith('zh-TW') || v.lang.startsWith('zh-HK') || v.lang === 'zh'
    );
    const scoreVoice = (v) => {
      let s = 0;
      const n = v.name.toLowerCase();
      if (n.includes('microsoft') && (n.includes('natural') || n.includes('online'))) s += 500;
      if (n.includes('natural') || n.includes('neural')) s += 200;
      if (n.includes('online')) s += 100;
      if (v.lang.startsWith('zh-cn')) s += 50;
      if (v.localService) s += 30;
      if (!n.includes('male') && !n.includes('man')) s += 20;
      // Sweet name bonus
      const sweet = ['xiaoxiao', 'yunyang', 'xiaoyi', 'xiaohan', 'xiaochen', 'xiaomeng'];
      for (const sw of sweet) { if (n.includes(sw)) { s += 40; break; } }
      return s;
    };
    zh.sort((a, b) => scoreVoice(b) - scoreVoice(a));

    const allZh = zh.length ? zh : allSystemVoices;
    allZh.forEach(v => {
      const opt = document.createElement('option');
      opt.value = v.name;
      const n = v.name.toLowerCase();
      const isNeural = n.includes('natural') || n.includes('neural') || (n.includes('microsoft') && n.includes('online'));
      const quality = isNeural ? '⭐ ' : '';
      opt.textContent = `${quality}${v.name} (${v.lang})`;
      if (v.name === ttsVoiceId) opt.selected = true;
      sel.appendChild(opt);
    });
  } else if (currentEngine === 'mimo') {
    // MiMo TTS voices
    const mimoVoices = [
      { id: '冰糖', desc: '冰糖 — 甜美可爱女声（推荐）' },
      { id: '茉莉', desc: '茉莉 — 温柔知性女声' },
      { id: '苏打', desc: '苏打 — 开朗活泼女声' },
      { id: 'Mia', desc: 'Mia — 英文甜美女声' },
      { id: 'Chloe', desc: 'Chloe — 英文清亮女声' },
      { id: '白桦', desc: '白桦 — 温暖男声' },
      { id: 'Milo', desc: 'Milo — 英文男声' },
      { id: 'Dean', desc: 'Dean — 英文沉稳男声' },
      { id: 'MimoDefault', desc: 'MimoDefault — AI默认音色' },
    ];
    mimoVoices.forEach(v => {
      const opt = document.createElement('option');
      opt.value = v.id;
      opt.textContent = v.desc;
      if (v.id === ttsVoiceId) opt.selected = true;
      sel.appendChild(opt);
    });
    if (!ttsVoiceId || !mimoVoices.find(v => v.id === ttsVoiceId)) {
      sel.value = '冰糖';
      ttsVoiceId = '冰糖';
    }
  }
  // Restore saved selection
  if (ttsVoiceId) {
    const match = [...sel.options].find(o => o.value === ttsVoiceId);
    if (match) sel.value = ttsVoiceId;
  }
}

// ----- Audio Cache -----
function getCacheKey(text, engine, voice, rate) {
  return `${engine}::${voice}::${rate.toFixed(2)}::${text}`;
}

function clearAudioCache() {
  // Revoke all blob URLs and clear
  for (const url of audioCache.values()) {
    try { URL.revokeObjectURL(url); } catch (e) {}
  }
  audioCache.clear();
}

// ----- Speak orchestration -----
function speakText(text, btnEl) {
  if (!text) return;
  stopSpeaking();

  ttsVoiceId = document.getElementById('ttsVoice').value;
  ttsPitch = parseFloat(document.getElementById('ttsPitch').value);
  ttsRate = parseFloat(document.getElementById('ttsRate').value);

  // Visual feedback
  if (btnEl) btnEl.classList.add('speaking');

  const onDone = () => {
    if (btnEl) btnEl.classList.remove('speaking');
    currentUtterance = null;
    currentAudio = null;
  };

  if (ttsEngine === 'mimo') {
    mimoTTS(text).then(() => onDone()).catch(() => onDone());
  } else {
    browserTTS(text, onDone);
  }
}

// ----- Browser TTS -----
function browserTTS(text, onDone) {
  if (!('speechSynthesis' in window)) { onDone(); return; }

  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'zh-CN';
  utterance.pitch = ttsPitch;
  utterance.rate = ttsRate;
  utterance.volume = 1;

  // Find selected voice
  const voiceId = document.getElementById('ttsVoice').value;
  if (voiceId) {
    const v = allSystemVoices.find(v => v.name === voiceId);
    if (v) utterance.voice = v;
  } else {
    // Auto-pick best voice
    const best = pickBestBrowserVoice();
    if (best) utterance.voice = best;
  }

  currentUtterance = utterance;
  utterance.onend = () => { currentUtterance = null; onDone(); };
  utterance.onerror = () => { currentUtterance = null; onDone(); };

  speechSynthesis.speak(utterance);
}

function pickBestBrowserVoice() {
  // Comprehensive list of known sweet/high-quality Chinese female voices
  // Microsoft neural voices (Windows 11 built-in)
  const sweetPatterns = [
    // Microsoft neural (top priority)
    { pattern: 'xiaoxiao', weight: 100 },  // 晓晓 — 甜美温柔
    { pattern: 'yunyang', weight: 95 },    // 云扬 — 清澈明亮
    { pattern: 'xiaoyi', weight: 90 },     // 晓伊 — 活泼可爱
    { pattern: 'yunjian', weight: 85 },    // 云健 — ?
    { pattern: 'yunjie', weight: 80 },     // ?
    { pattern: 'xiaochen', weight: 75 },   // 晓辰
    { pattern: 'xiaohan', weight: 70 },    // 晓涵 — 温柔
    { pattern: 'xiaomeng', weight: 65 },   // 晓梦
    { pattern: 'xiaomo', weight: 60 },     // 晓墨
    { pattern: 'xiaoqiu', weight: 55 },    // 晓秋
    { pattern: 'xiaoshuang', weight: 50 }, // 晓双
    { pattern: 'xiaoxuan', weight: 45 },   // 晓萱
    { pattern: 'xiaoyan', weight: 40 },    // 晓燕
    { pattern: 'xiaoyou', weight: 35 },    // 晓悠
    { pattern: 'xiaozhen', weight: 30 },   // 晓甄
    // Other known voice names
    { pattern: 'tingting', weight: 25 },
    { pattern: 'yaoyao', weight: 20 },
    { pattern: 'zhiwei', weight: 15 },
    { pattern: 'hanhan', weight: 10 },
    { pattern: 'meijia', weight: 5 },
  ];

  const zh = allSystemVoices.filter(v =>
    v.lang.startsWith('zh-CN') || v.lang.startsWith('zh-TW') || v.lang.startsWith('zh-HK') || v.lang === 'zh'
  );

  if (!zh.length) return allSystemVoices[0] || null;

  // Score and sort
  const scored = zh.map(v => {
    let score = 0;
    const n = v.name.toLowerCase();
    const lang = v.lang.toLowerCase();

    // Huge bonus for Microsoft neural voices
    if (n.includes('microsoft') && (n.includes('natural') || n.includes('online'))) score += 500;

    // Bonus for neural/online/natural indicators
    if (n.includes('natural') || n.includes('neural')) score += 200;
    if (n.includes('online')) score += 100;

    // Prefer zh-CN over zh-TW/HK
    if (lang.startsWith('zh-cn')) score += 50;

    // Prefer local voices (usually higher quality)
    if (v.localService) score += 30;

    // Prefer non-male voices
    if (!n.includes('male') && !n.includes('man')) score += 20;

    // Check sweet name patterns
    for (const { pattern, weight } of sweetPatterns) {
      if (n.includes(pattern)) {
        score += weight;
        break; // first match only
      }
    }

    return { voice: v, score };
  });

  scored.sort((a, b) => b.score - a.score);
  return scored[0].voice;
}

// ----- MiMo TTS with cache -----
async function mimoTTS(text) {
  const key = ttsMimoApiKey || document.getElementById('ttsMimoApiKey').value.trim();
  if (!key) {
    console.warn('MiMo TTS: 请先在语音设置中填入 MiMo API Key');
    browserTTS(text, () => {});
    return;
  }

  const voice = document.getElementById('ttsVoice').value || '冰糖';
  const speed = ttsRate;
  // Prepend emotion/style tag if selected
  const style = ttsMimoStyle || document.getElementById('ttsMimoStyle').value || '';
  const styledText = style ? `${style}${text}` : text;

  const cacheKey = getCacheKey(styledText, 'mimo', voice, speed);
  if (audioCache.has(cacheKey)) {
    return playAudioBlob(audioCache.get(cacheKey));
  }

  try {
    const res = await fetch('https://api.xiaomimimo.com/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${key}`,
      },
      body: JSON.stringify({
        model: 'mimo-v2.5-tts',
        messages: [
          { role: 'user', content: styledText },
          { role: 'assistant', content: styledText },
        ],
        audio: {
          format: 'mp3',
          voice: voice,
          speed: speed,
        },
      }),
    });

    if (!res.ok) {
      const err = await res.text();
      console.error('MiMo TTS error:', res.status, err);
      browserTTS(text, () => {});
      return;
    }

    const json = await res.json();
    const base64Audio = json.choices?.[0]?.message?.audio?.data;
    if (!base64Audio) {
      console.error('MiMo TTS: no audio data in response', json);
      browserTTS(text, () => {});
      return;
    }

    // Decode base64 to blob
    const byteChars = atob(base64Audio);
    const bytes = new Uint8Array(byteChars.length);
    for (let i = 0; i < byteChars.length; i++) {
      bytes[i] = byteChars.charCodeAt(i);
    }
    const blob = new Blob([bytes], { type: 'audio/mp3' });
    const url = URL.createObjectURL(blob);

    // Cache it (limit to ~50 entries)
    if (audioCache.size >= 50) {
      const firstKey = audioCache.keys().next().value;
      try { URL.revokeObjectURL(audioCache.get(firstKey)); } catch (e) {}
      audioCache.delete(firstKey);
    }
    audioCache.set(cacheKey, url);

    return playAudioBlob(url);
  } catch (e) {
    console.error('MiMo TTS fetch error:', e);
    browserTTS(text, () => {});
  }
}

function playAudioBlob(url) {
  return new Promise((resolve) => {
    const audio = new Audio(url);
    currentAudio = audio;
    audio.onended = () => { currentAudio = null; resolve(); };
    audio.onerror = () => { currentAudio = null; resolve(); };
    audio.play().catch(() => resolve());
  });
}

// ----- Stop & Preview -----
function stopSpeaking() {
  if ('speechSynthesis' in window) speechSynthesis.cancel();
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  document.querySelectorAll('.speaker-btn.speaking').forEach(b => b.classList.remove('speaking'));
  currentUtterance = null;
}

function previewTTS() {
  saveTTSSettings();
  const sample = '你好呀，我是你的AI助手，这是我的语音效果测试。你喜欢我的声音吗？';
  stopSpeaking();
  // Briefly flash the preview button
  const btn = document.querySelector('.tts-preview-btn');
  btn.textContent = '🔊 正在试听...';
  btn.disabled = true;

  const restore = () => {
    btn.textContent = '🔊 试听语音效果';
    btn.disabled = false;
  };

  if (ttsEngine === 'mimo') {
    mimoTTS(sample).then(restore).catch(restore);
  } else {
    browserTTS(sample, restore);
  }
}

// ----- Auto-speak toggle -----
function toggleAutoSpeak() {
  autoSpeak = !autoSpeak;
  localStorage.setItem('rp_autoSpeak', autoSpeak);
  updateAutoSpeakBtn();
  if (autoSpeak) stopSpeaking();
}

function updateAutoSpeakBtn() {
  const btn = document.getElementById('autoSpeakBtn');
  if (autoSpeak) {
    btn.classList.add('active');
    btn.textContent = '🔊';
    btn.title = '自动朗读AI回复：开';
  } else {
    btn.classList.remove('active');
    btn.textContent = '🔇';
    btn.title = '自动朗读AI回复：关';
  }
}

// ═══════════════════════════════════════
// iOS 26 / iPhone 16 Pro keyboard & viewport handling
// ═══════════════════════════════════════
(function() {
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
    (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  if (!isIOS) return;

  // Add ios class to body for potential CSS hooks
  document.body.classList.add('ios-device');

  // ── Visual Viewport API: handle iOS keyboard ──
  if (window.visualViewport) {
    const messages = document.getElementById('messages');
    const inputArea = document.querySelector('.input-area');

    const handleViewport = () => {
      const viewport = window.visualViewport;
      const keyboardHeight = window.innerHeight - viewport.height;

      if (keyboardHeight > 100) {
        // Keyboard is open — pin input above it
        inputArea.style.paddingBottom = (keyboardHeight - (parseFloat(getComputedStyle(document.body).paddingBottom) || 0)) + 'px';
        // Scroll messages to bottom
        requestAnimationFrame(() => {
          messages.scrollTop = messages.scrollHeight;
        });
      } else {
        // Keyboard closed — reset
        inputArea.style.paddingBottom = '';
      }
    };

    visualViewport.addEventListener('resize', handleViewport);
    visualViewport.addEventListener('scroll', handleViewport);
  }

  // ── Prevent iOS overscroll/bounce on body ──
  document.addEventListener('touchmove', function(e) {
    if (e.target.closest('.messages') || e.target.closest('.chat-list') ||
        e.target.closest('.collapsible-body') || e.target.closest('.modal')) {
      // Allow scroll within these containers
      return;
    }
    // Prevent body scroll
    if (!e.target.closest('input') && !e.target.closest('textarea')) {
      e.preventDefault();
    }
  }, { passive: false });

  // ── Fix iOS :active state ──
  document.addEventListener('touchstart', function() {}, { passive: true });
})();
</script>
